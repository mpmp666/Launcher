; PlatformIO Project Configuration File
;
; Xueersi XiaoMiao ESP32 handheld.
; Hardware notes are taken from xueersi-xiaomiao-main/README.md and
; xueersi-xiaomiao-main/esphome/packages/device.yaml.

[env:xueersi-xiaomiao]
board = xueersi-xiaomiao
board_build.partitions = support_files/custom_4Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/xueersi-xiaomiao>
build_flags =
	${env.build_flags}
	-Iboards/xueersi-xiaomiao
	-DXUEERSI_XIAOMIAO=1
	-DOTA_TAG='"xueersi-xiaomiao"'

	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-mfix-esp32-psram-cache-strategy=memw

	-DROTATION=3
	-DHAS_BTN=1
	-DHAS_5_BUTTONS=1
	-DUP_BTN=2
	-DDW_BTN=13
	-DL_BTN=27
	-DR_BTN=35
	-DSEL_BTN=34
	-DESC_BTN=12
	-DBTN_ACT=LOW
	-DBTN_ALIAS='"A"'

	-DLED=-1
	-DLED_ON=HIGH
	-DFP=1
	-DFM=1
	-DFG=2

	-DST7735_DRIVER=1
	-DTFT_WIDTH=128
	-DTFT_HEIGHT=160
	-DTFT_MISO=19
	-DTFT_MOSI=23
	-DTFT_SCLK=18
	-DTFT_CS=5
	-DTFT_DC=4
	-DTFT_RST=-1
	-DTFT_IPS=0
	-DTFT_COL_OFS1=0
	-DTFT_ROW_OFS1=0
	-DTFT_COL_OFS2=0
	-DTFT_ROW_OFS2=0

	-DSDCARD_SPI_BUS=VSPI
	-DSDCARD_CS=22
	-DSDCARD_SCK=18
	-DSDCARD_MISO=19
	-DSDCARD_MOSI=23

lib_ignore =
	SensorLib
	XPowersLib
